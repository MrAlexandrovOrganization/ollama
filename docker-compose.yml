# Standalone Ollama LLM service.
# Run independently: docker compose up -d
#
# Other projects connect by joining the external network "ollama-net":
#
#   networks:
#     ollama-net:
#       external: true
#
# Then set LLM_HOST=ollama, LLM_PORT=11434.
# The port is NOT published to the host — only containers in ollama-net can reach it.

networks:
  ollama-net:
    name: ollama-net

services:
  ollama:
    image: ollama/ollama:0.18.2
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ollama_data:/root/.ollama
      - ./entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_NUM_PARALLEL=1       # CPU: одна задача одновременно
      - OLLAMA_MAX_LOADED_MODELS=1  # держать в памяти только одну модель
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    networks:
      - ollama-net
    # No "ports:" — not accessible from host or public IP, only via ollama-net.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=false  # локальный доступ без авторизации
    networks:
      - ollama-net
    depends_on:
      ollama:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data:
  open_webui_data:
